# LiteLLM proxy config — virtual model map for Alice's local-model
# traffic. Call sites (viewer.lobe_labeler, alice_thinking.stage_d_judges,
# alice_thinking.workflows.stage_b.subroutines, cue_runner reranker)
# talk OpenAI-compatible to http://alice-litellm:4000 using these
# `model_name`s; the proxy forwards to the actual backend.
#
# Adding a new model: append to model_list with a fresh `model_name`
# and matching `litellm_params`. Add the corresponding `LITELLM_BASE_URL`
# usage on the call site — never let the call site know the real
# backend URL.
#
# Scope today: local Qwen only. Cloud Anthropic traffic still goes
# direct via claude-agent-sdk + ANTHROPIC_BASE_URL; cloud passthrough
# through this proxy is a deliberate next step (see docs/refactor or
# the PR that added this file).

model_list:
  # Stage B/D consolidation + viewer lobe labels. Backend is the LAN
  # Qwen runtime served by pi-mono at 10.20.30.177:8033.
  - model_name: qwen-local
    litellm_params:
      model: openai/qwen3-32b
      api_base: http://10.20.30.177:8033/v1
      api_key: dummy
      # Imputed "what this would cost behind a hosted API" — the backend
      # is local/$0, but pricing it lets the dashboard track equivalent
      # spend. Qwen 35B-A3B reference: $0.15 in / $1.00 out per 1M tokens.
      input_cost_per_token: 0.00000015
      output_cost_per_token: 0.000001

  # Cozylobe's CozyHem-event narrator/classifier. Backend is the LAN
  # Qwen runtime on the 3090 desktop at 10.20.30.147 — switched
  # 2026-05-27 from Qwen3.6-27B on :8033 to Qwen3.6-35B-A3B (MoE) on
  # :8034 for ~3.8x speedup (39.75 -> 151.9 tok/s gen on motion-event
  # narration). The 27B container (llama-27b) is stopped; use the
  # qwen-desktop-27b virtual model below to roll back.
  - model_name: qwen-desktop
    litellm_params:
      model: openai/qwen3.6-a3b
      api_base: http://10.20.30.147:8034/v1
      api_key: dummy
      # Qwen3 30B-A3B reference: $0.15 in / $1.00 out per 1M tokens.
      input_cost_per_token: 0.00000015
      output_cost_per_token: 0.000001

  # Explicit alias for the A3B endpoint — same backend as qwen-desktop.
  # Use when a call site wants to assert it's on the A3B model.
  - model_name: qwen-desktop-a3b
    litellm_params:
      model: openai/qwen3.6-a3b
      api_base: http://10.20.30.147:8034/v1
      api_key: dummy
      input_cost_per_token: 0.00000015
      output_cost_per_token: 0.000001

  # Rollback target — points at the dormant 27B container on :8033.
  # To use: 'sudo docker start llama-27b' on .147, then swap
  # qwen-desktop's api_base back to :8033 (or change call sites to
  # use this name explicitly).
  - model_name: qwen-desktop-27b
    litellm_params:
      model: openai/qwen3.6-27b
      api_base: http://10.20.30.147:8033/v1
      api_key: dummy
      input_cost_per_token: 0.0000003
      output_cost_per_token: 0.0000032

  # Reranker for the speaking-side retrieval cue runner. Same backend
  # host today; separate virtual name so the model can be swapped
  # without touching call sites.
  - model_name: qwen-rerank
    litellm_params:
      model: openai/qwen3-reranker
      api_base: http://10.20.30.177:8033/v1
      api_key: dummy
      # Nominal — Jason didn't quote a rerank rate; adjust if it gets used.
      input_cost_per_token: 0.0000001
      output_cost_per_token: 0.0000001

litellm_settings:
  # Silently strip params the backend doesn't accept (e.g. response_format
  # on older Qwen builds). Call sites can stay backend-agnostic.
  drop_params: true
  set_verbose: false

general_settings:
  # Master key — required for the /ui dashboard (it signs the login
  # session) and enforced on /v1. Every call site sends this same value
  # as a Bearer token: pi (pi-models.json apiKey), the cozylobe
  # classifier, viewer.lobe_labeler, and thinking stage_b/d all read it
  # from the LITELLM_MASTER_KEY env. Sourced from the container env
  # (compose default sk-alice-local; rotate via alice.env).
  master_key: os.environ/LITELLM_MASTER_KEY
  # Capture the actual request prompts + responses in the spend logs so
  # the dashboard's request view shows the messages, not just token
  # counts. NOTE: this persists full prompt/response content (incl. home
  # + personal data in Alice's prompts) to the Postgres store.
  store_prompts_in_spend_logs: true
