# Alice's sandbox — single-container shape (EKS Phase 2).
#
# One container runs the consolidated image from sandbox/Dockerfile (#152):
# s6-overlay supervises signal-daemon, alice-speaking, alice-thinker, the
# viewer, and the housekeeping daemons (gh-watcher, sm-dispatcher,
# autopush, embedder, reload-watcher, thinker-watchdog). The blue/green
# split, the alice-net bridge, the worker lease, and the compose
# `profiles` mechanic are all gone — everything is localhost in here.
#
# The previous 3-service compose lives at sandbox/legacy-3svc.yml for the
# cutover window (rollback path). The actual switch is handled by the
# cutover doc; see [[2026-05-12-eks-phase-2-single-container]] §6.
#
# Personal sidecars go in docker-compose.override.yml.

services:
  alice:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    image: alice:latest
    container_name: alice
    hostname: alice
    restart: unless-stopped
    # Match S6_SERVICES_GRACETIME below: a SIGTERM during a Claude turn
    # or an alice-think wake can legitimately take minutes to drain
    # cleanly, and getting SIGKILLed at the gracetime cliff defeats the
    # drain hooks. 30 min mirrors the legacy CLEANUP_TIMEOUT used by
    # the old alice-deploy script.
    stop_grace_period: 30m
    ports:
      # viewer — FastAPI UI, served by the in-container alice-viewer s6 service.
      - "7777:7777"
      # signal-cli RPC — was previously published only on the alice-net bridge
      # from the alice-daemon container. Single container now, so we publish
      # it to the host. Signal client work on the host (manual signal-cli
      # commands) can talk to the same daemon without nsenter/docker exec.
      - "8080:8080"
    environment:
      # signal-cli is in the same container; no inter-service hop.
      SIGNAL_API: "http://localhost:8080"
      SIGNAL_LOG_FILE: "/state/daemon/signal-daemon.log"
      STATE_DIR: "/state/worker"
      TZ: "${ALICE_TZ:-America/New_York}"
      PATH: "/home/alice/alice-tools/bin:/home/alice/.local/bin:/usr/local/bin:/usr/bin:/bin"
      # CLI transport socket — host-shared via /state so external tools
      # (and any future sidecar containers an override adds) can reach
      # the speaking daemon's local RPC. See legacy-3svc.yml for the
      # macOS/virtiofs caveat that drove this off /tmp.
      ALICE_CLI_SOCKET: "/state/alice.sock"
      # s6-overlay's default 3-second graceperiod is far too short for the
      # speaking/thinker drain on shutdown. 1800000 ms = 30 min, matching
      # stop_grace_period above so docker doesn't SIGKILL out from under
      # s6's drain. A wake older than that is a hung wake the watchdog
      # should have surfaced; force-kill is fine at that point.
      S6_SERVICES_GRACETIME: "${S6_SERVICES_GRACETIME:-1800000}"
      S6_KILL_GRACETIME: "${S6_KILL_GRACETIME:-1800000}"
      # GitHub PAT for the gh CLI (and git-over-https via gh's credential
      # helper). Sourced from alice.env by bin/_alice-env.sh, so adding
      # GH_TOKEN=ghp_... to alice.env then bouncing the container is
      # enough to pick it up. Empty (the default) lets gh fall through to
      # the mounted ~/.config/gh OAuth credentials.
      GH_TOKEN: "${GH_TOKEN:-}"
      # A2A (Google Agent2Agent protocol) — opt-in via alice.env. The
      # speaking daemon spins up a uvicorn server on this port inside the
      # container when ALICE_A2A_ENABLED=true. Not host-published by
      # default; add a docker-compose.override.yml entry to publish.
      ALICE_A2A_ENABLED: "${ALICE_A2A_ENABLED:-}"
      ALICE_A2A_PORT: "${ALICE_A2A_PORT:-}"
      ALICE_A2A_HOST: "${ALICE_A2A_HOST:-}"
      ALICE_A2A_PRINCIPAL: "${ALICE_A2A_PRINCIPAL:-}"
      ALICE_A2A_EXTERNAL_URL: "${ALICE_A2A_EXTERNAL_URL:-}"
      # viewer-chat transport (PR #46). Speaking daemon listens on
      # localhost (no longer 0.0.0.0 — the viewer is in the same
      # container now, no Docker bridge to traverse).
      ALICE_VIEWER_CHAT_HOST: "127.0.0.1"
      ALICE_VIEWER_CHAT_PORT: "8182"
      # Viewer process config (folded in from the retired alice-viewer
      # service block).
      ALICE_VIEWER_HOST: "0.0.0.0"
      ALICE_VIEWER_PORT: "7777"
      ALICE_STATE: "/state/worker"
      ALICE_MIND: "/home/alice/alice-mind"
      ALICE_VIEWER_CACHE_DIR: "/state/viewer-cache"
      # Hot-reload on bind-mounted Python source changes — keeps the
      # viewer in parity with the worker, where `alice-reload-watcher`
      # already re-execs alice-speaking on source edits. Scoped to
      # src/viewer/ inside the run() entrypoint. Issue #130.
      ALICE_VIEWER_RELOAD: "1"
      # Opt into LLM-derived display labels for memory-graph lobes
      # (viewer.lobe_labeler). Cached in registry.json keyed on
      # member-set signature, so flipping this on doesn't burn tokens
      # on every page load — only on minted/drifted lobes.
      ALICE_LOBE_LLM_LABELS: "1"
      # viewer-chat client — speaking daemon is now localhost (no more
      # blue/green DNS dance). Port must match ALICE_VIEWER_CHAT_PORT
      # above.
      ALICE_VIEWER_CHAT_DAEMON_HOST: "127.0.0.1"
      ALICE_VIEWER_CHAT_DAEMON_PORT: "8182"
      # LiteLLM proxy — unified endpoint for local models (Qwen LAN
      # endpoint today; future cloud passthrough TBD). Call sites
      # (viewer.lobe_labeler, alice_thinking.stage_d_judges,
      # alice_thinking.workflows.stage_b.subroutines) read this and
      # talk OpenAI-compatible to the sidecar; the proxy maps virtual
      # model names (qwen-local, qwen-rerank) to actual backends in
      # sandbox/litellm/config.yaml. Hostname resolves on compose's
      # default network bridge.
      LITELLM_BASE_URL: "http://alice-litellm:4000/v1"
    volumes:
      # Mind + tools default to <repo>/data/{alice-mind,alice-tools}; alice-up
      # exports ALICE_MIND / ALICE_TOOLS pointing there. Fall back to the
      # legacy ~/alice-{mind,tools} paths if compose is invoked directly.
      - ${ALICE_MIND:-${HOME}/alice-mind}:/home/alice/alice-mind
      - ${ALICE_TOOLS:-${HOME}/alice-tools}:/home/alice/alice-tools
      # Monorepo bind-mounted rw so Alice can self-improve in place. The
      # host path holds everything that runs her — agent kernel, speaking
      # daemon, thinking wake, viewer — under src/*. Policy: thinking MUST
      # NOT write here (hemisphere boundary); enforcement is documentation.
      - ${ALICE_REPO:-${HOME}/alice}:/home/alice/alice
      # State (worker, viewer-cache, daemon log, sci-env venv, etc.).
      - ${HOME}/.local/state/alice:/state
      # signal-cli's account database (linked devices, contacts, etc.).
      - ${HOME}/.local/share/signal-cli:/home/alice/.local/share/signal-cli
      # Alice's per-container Claude config (separate from the host's,
      # so the host's running claude binary doesn't fight the container's
      # over session state).
      - ${HOME}/.alice-claude:/home/alice/.claude
      # Host's Claude config — mounted as a DIRECTORY (not individual
      # files) so atomic file replaces (e.g. /login writing a new
      # credentials file) become visible inside the container. The
      # entrypoint symlinks .credentials.json into its expected
      # location.
      - ${HOME}/.claude:/host-claude:ro
      - ${HOME}/.config/alice:/home/alice/.config/alice:ro
      - ${HOME}/.config/gh:/home/alice/.config/gh:ro
      - ${HOME}/.ssh:/home/alice/.ssh:ro
    working_dir: /home/alice/alice-mind
    # GPU pass-through (for the in-container Qwen3-Embedding-4B served
    # from /state/sci-env) lives in docker-compose.gpu.yml, not here.
    # The default deploy assumes the embedder is reached over HTTP via
    # ALICE_EMBED_URL, so no host GPU is required. Hosts running the
    # local embedder opt in by composing the gpu file:
    #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml ...
    # alice-up and alice-deploy auto-include it when the nvidia runtime
    # is registered on the host (see bin/_alice-env.sh).
    depends_on:
      litellm:
        condition: service_healthy

  # LiteLLM proxy — single OpenAI-compatible endpoint for all local
  # model traffic. Call sites use LITELLM_BASE_URL (set on the alice
  # service above) plus a virtual model name (qwen-local, qwen-rerank)
  # which the proxy maps to the actual backend in
  # sandbox/litellm/config.yaml. Sidecar (not s6 inside alice) so the
  # proxy restarts and logs independently; if it crashes, speaking and
  # thinking see 502s on local-model calls and recover when it comes
  # back rather than the whole worker tipping over.
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: alice-litellm
    hostname: alice-litellm
    restart: unless-stopped
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
    environment:
      # Master key for all proxy auth. Sourced from alice.env via
      # bin/_alice-env.sh; falls back to a stable local default so
      # fresh checkouts work without env setup. Rotate by setting
      # LITELLM_MASTER_KEY in alice.env.
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-alice-local}"
    volumes:
      - ./litellm/config.yaml:/etc/litellm/config.yaml:ro
    ports:
      # Localhost-only publish — debugging from the host without
      # docker-exec. Inter-container traffic uses the compose network
      # at alice-litellm:4000 (see LITELLM_BASE_URL on alice).
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health/liveliness"]
      interval: 15s
      timeout: 3s
      retries: 4
      start_period: 20s
