# cozylobe throttle — diff-aware filter for SSE entity:update events.
#
# This file is the SHIPPED DEFAULT. On first start, alice_cozylobe.daemon
# copies it to ~/alice-mind/config/cozylobe-throttle.yaml if that path
# doesn't already exist. After that, agents (thinking, speaking, other
# lobes) edit the user-side copy; cozylobe reloads on the next event
# via an mtime check — no restart needed.
#
# Module docs: src/alice_cozylobe/throttle.py
# Issue: #371

# Numeric fields the throttle tracks for micro-delta suppression. Each
# value is the threshold below which a change is considered routine.
# Both fields are assumed to be normalized to [0.0, 1.0] (matches the
# brightness/color_temp scale CozyHem emits).
tracked_numeric_fields:
  brightness: 0.05
  color_temp: 0.05

# After suppressing one or more events on a given entity, emit ONE
# summary event every coalesce_window_s seconds carrying the entity's
# current state + the count of suppressed events since the last emit.
# 300s (5 min) matches issue #371's acceptance criteria.
coalesce_window_s: 300.0

# Per-entity escape hatch. Any entity_id in this list is NEVER
# suppressed — useful when thinking decides one sensor is always
# interesting (e.g. a specific motion zone she's debugging).
always_pass_entities: []

# Per-kind escape hatch. These kinds bypass the throttle entirely.
# Defaults cover the CRITICAL fast-path kinds plus the obvious "always
# interesting" non-routine events. Add more here if a producer rename
# leaks routine traffic into a new kind.
always_pass_kinds:
  - doorbell_pressed
  - smoke_detected
  - glass_break
  - motion_detected
  - scene_changed
  - mode_changed

# Phase 2 (#379) — INPUT_KINDS allowlist.
#
# The PRIMARY filter, applied at the SSE consumer level BEFORE the
# throttle. Any event whose kind is NOT on this list is dropped
# silently — no throttle, no classify, no note. OUTPUT events
# (circadian brightness updates, propagated light states after a
# scene change, automation setpoint writes, micro-deltas) never enter
# the pipeline at all.
#
# Motion events (motion_detected) on this list bypass the throttle
# entirely and route through the motion pipeline in
# src/alice_cozylobe/motion.py. Other INPUT_KINDS events still pass
# through the throttle as a secondary quality gate.
#
# Empty list → "accept all" (fail-open). A botched edit can't take
# cozylobe offline silently — at worst it lets through noise.
input_kinds:
  - motion_detected
  - doorbell_pressed
  - button_pressed
  - door_opened
  - door_closed
  - window_opened
  - window_closed
  - temperature_changed
  - smoke_detected
  - glass_break
  - water_leak
  - camera_event
  - scene_changed
  - mode_changed
  - lock_state_changed

# Issue #393 — entity_id allowlist for entity:update events.
#
# CozyHem doesn't emit motion/door/sensor events with a distinct kind;
# they arrive as kind=entity:update with the sensor's entity_id. The
# kind-only INPUT_KINDS filter above silently dropped 100% of those
# (cozylobe.log 2026-05-26 16:05 EDT: 427 entity:update / 0
# motion_detected over the prior hour). This second arm of the input
# filter matches entity:update events whose entity_id passes one of
# these fnmatch globs (case-sensitive). The motion pipeline still
# does its own narrower entity-id check for routing motion → the
# motion-special-class flow.
#
# Empty list → no entity:update events qualify via this path (i.e.
# the regression-free fallback to the kind-only #379 behavior).
tracked_input_entity_patterns:
  - "binary_sensor.*_motion"
  - "binary_sensor.*_motion_*"        # Hue compound naming: *_motion_sensor_motion
  - "binary_sensor.*_doorbell*"
  - "binary_sensor.*_door"
  - "binary_sensor.*_window"
  - "binary_sensor.*_smoke"
  - "binary_sensor.*_glass_break"
  - "binary_sensor.*_water_leak"
  - "binary_sensor.*_lock"

# Phase 4 (#381) — adjacency inference window.
#
# Two motion events in non-adjacent rooms (per the cozylobe-cortex
# vault's room.adjacent lists) within this many seconds count as
# evidence of an unknown adjacency. The AdjacencyInferrer increments
# an in-memory counter per (room_a, room_b) pair; once the count
# crosses the 5/10/20/50 thresholds, an inline IS-ADJACENT-TO edge
# is written to both rooms' notes (weight 0.3 / 0.5 / 0.7 / 0.9).
#
# 30s is the design's default — long enough to catch a brisk walk
# between adjacent rooms, short enough to filter out coincidental
# fires from different people in different parts of the house.
adjacency_inference_window_s: 30.0
