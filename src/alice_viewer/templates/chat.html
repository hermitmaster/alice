{% extends "base.html" %}
{% block title %}chat{% endblock %}
{% block body %}
<section class="chat-page">
  <header class="chat-header">
    <h1>chat with {{ personae.agent.name }}</h1>
    <div class="chat-status muted" id="chat-status">connecting…</div>
  </header>

  <div id="chat-log" class="chat-log" aria-live="polite">
    <div class="chat-empty muted">Loading history…</div>
  </div>

  <form id="chat-form" class="chat-form" autocomplete="off">
    <textarea id="chat-input"
              placeholder="Message {{ personae.agent.name }}… (Enter to send, Shift+Enter for newline)"
              rows="2"
              required></textarea>
    <button type="submit" id="chat-send">send</button>
  </form>
</section>

<script>
(function () {
  const log = document.getElementById("chat-log");
  const form = document.getElementById("chat-form");
  const input = document.getElementById("chat-input");
  const button = document.getElementById("chat-send");
  const status = document.getElementById("chat-status");

  // Single in-flight assistant message element so consecutive chunks
  // accumulate into one bubble. Reset on each `done` or `error`.
  let inflight = null;
  let inflightBuf = "";
  // When the lifecycle wire is active, the daemon emits text_chunk
  // events during kernel.run() AND batched `chunk` events after
  // transport.send(). They carry the same text — we render lifecycle
  // (live, granular) and ignore `chunk` to avoid duplication. Detected
  // on the first text_start / tool_call_start / thinking_start.
  let lifecycleActive = false;
  // Transient indicator element (spinner + status line) — shows what
  // Alice is doing between turn_start and the first visible text.
  let indicator = null;
  // Currently-shown tool call. Cleared on tool_call_end or next event.
  let activeToolCall = null;
  // Per-turn thinking buffer. Rendered in a collapsible panel under
  // the assistant bubble. Reset on turn_start.
  let thinkingBuf = "";
  let thinkingPanel = null;

  function setStatus(text, level) {
    status.textContent = text;
    status.classList.remove("ok", "warn", "muted");
    status.classList.add(level || "muted");
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, (c) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",
    }[c]));
  }

  function renderMarkdown(text) {
    // marked + DOMPurify are already loaded in base.html for the rest
    // of the viewer. Fall back to escaped plain text if either is
    // missing (defensive).
    if (window.marked && window.DOMPurify) {
      try {
        const raw = window.marked.parse(text, { breaks: true });
        return window.DOMPurify.sanitize(raw);
      } catch (e) {
        // fall through to escaped
      }
    }
    return escapeHtml(text).replace(/\n/g, "<br>");
  }

  function appendMessage(role, text) {
    if (log.querySelector(".chat-empty")) {
      log.innerHTML = "";
    }
    const wrap = document.createElement("div");
    wrap.className = "chat-msg chat-msg-" + role;
    const body = document.createElement("div");
    body.className = "chat-msg-body";
    body.innerHTML = renderMarkdown(text);
    const meta = document.createElement("div");
    meta.className = "chat-msg-meta muted";
    meta.textContent = role === "user" ? "you" : "{{ personae.agent.name | lower }}";
    wrap.appendChild(meta);
    wrap.appendChild(body);
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
    return wrap;
  }

  function startInflight() {
    inflightBuf = "";
    inflight = appendMessage("alice", "");
  }

  function appendInflight(chunk) {
    if (!inflight) startInflight();
    inflightBuf += chunk;
    const body = inflight.querySelector(".chat-msg-body");
    body.innerHTML = renderMarkdown(inflightBuf);
    log.scrollTop = log.scrollHeight;
  }

  function endInflight() {
    if (thinkingPanel) {
      thinkingPanel.open = false;
    }
    inflight = null;
    inflightBuf = "";
    clearIndicator();
    activeToolCall = null;
    thinkingPanel = null;
    thinkingBuf = "";
    lifecycleActive = false;
    button.disabled = false;
    input.disabled = false;
    input.focus();
  }

  // Transient indicator (spinner row) — shown while Alice is working
  // but no visible text has arrived yet. Replaced by tool-call lines
  // or removed once text_start fires.
  function showIndicator(text) {
    if (log.querySelector(".chat-empty")) {
      log.innerHTML = "";
    }
    if (!indicator) {
      indicator = document.createElement("div");
      indicator.className = "chat-indicator muted";
      log.appendChild(indicator);
    }
    indicator.innerHTML =
      '<span class="chat-indicator-dot"></span>' +
      '<span class="chat-indicator-text"></span>';
    indicator.querySelector(".chat-indicator-text").textContent = text;
    log.scrollTop = log.scrollHeight;
  }

  function clearIndicator() {
    if (indicator && indicator.parentNode) {
      indicator.parentNode.removeChild(indicator);
    }
    indicator = null;
  }

  function setToolCall(name) {
    activeToolCall = name;
    showIndicator("calling " + name + "…");
  }

  function endToolCall() {
    // Don't clear the indicator outright — keep showing "thinking"
    // until the next event arrives. Empirically this avoids a
    // flicker between tool calls.
    if (activeToolCall) {
      showIndicator("thinking…");
      activeToolCall = null;
    }
  }

  // Collapsible thinking panel attached to the in-flight bubble. The
  // panel header summarises ("3 thoughts") and toggles a body with
  // the full reasoning text. Rendered as muted markdown.
  function ensureThinkingPanel() {
    if (thinkingPanel) return thinkingPanel;
    if (!inflight) startInflight();
    thinkingPanel = document.createElement("details");
    thinkingPanel.className = "chat-thinking";
    // Open during the turn so the user sees reasoning stream live.
    // Collapsed back to a clickable summary by endInflight().
    thinkingPanel.open = true;
    const summary = document.createElement("summary");
    summary.className = "chat-thinking-summary muted";
    summary.textContent = "thoughts";
    const body = document.createElement("div");
    body.className = "chat-thinking-body muted";
    thinkingPanel.appendChild(summary);
    thinkingPanel.appendChild(body);
    inflight.appendChild(thinkingPanel);
    return thinkingPanel;
  }

  function appendThinking(text) {
    ensureThinkingPanel();
    thinkingBuf += (thinkingBuf ? "\n\n" : "") + text;
    const body = thinkingPanel.querySelector(".chat-thinking-body");
    body.innerHTML = renderMarkdown(thinkingBuf);
    log.scrollTop = log.scrollHeight;
  }

  async function loadHistory() {
    try {
      const r = await fetch("/api/chat/history?limit=50");
      if (!r.ok) {
        setStatus("history unavailable (" + r.status + ")", "warn");
        log.innerHTML = '<div class="chat-empty muted">No history yet. Say something.</div>';
        return;
      }
      const body = await r.json();
      const msgs = body.messages || [];
      if (!msgs.length) {
        log.innerHTML = '<div class="chat-empty muted">No history yet. Say something.</div>';
        return;
      }
      log.innerHTML = "";
      for (const m of msgs) {
        appendMessage(m.role === "alice" ? "alice" : "user", m.text || "");
      }
    } catch (e) {
      setStatus("history fetch failed", "warn");
    }
  }

  function openStream() {
    const es = new EventSource("/api/chat/stream");
    es.onopen = () => setStatus("connected", "ok");
    es.onmessage = (ev) => {
      let data;
      try { data = JSON.parse(ev.data); } catch (e) { return; }
      if (!data || !data.type) return;
      // Wire model for Alice's flow:
      //   `chunk` events come from `transport.send()` which fires when
      //   Alice calls the `send_message` MCP tool — that text IS the
      //   user-visible reply, so it lands in the main bubble.
      //   `text_chunk` / `thinking_chunk` are lifecycle events for
      //   the assistant's reasoning between tool calls; they go in
      //   the collapsible thoughts panel so they don't drown the
      //   answer. `tool_call_start` drives the transient indicator.
      switch (data.type) {
        case "ack":
        case "turn_start":
          lifecycleActive = lifecycleActive || data.type === "turn_start";
          showIndicator("thinking…");
          return;
        case "tool_call_start":
          lifecycleActive = true;
          // send_message is Alice's "reply" tool, not a worth-showing
          // tool. The chunks it produces will populate the bubble.
          if (data.name && data.name.indexOf("send_message") === -1) {
            setToolCall(data.name);
          }
          return;
        case "tool_call_end":
          endToolCall();
          return;
        case "text_start":
        case "thinking_start":
          lifecycleActive = true;
          ensureThinkingPanel();
          return;
        case "text_chunk":
        case "thinking_chunk":
          lifecycleActive = true;
          if (data.text) appendThinking(data.text);
          // If a tool call was active, the model is now narrating
          // again — the tool has effectively completed. Revert the
          // indicator from "calling X…" back to "thinking…".
          if (activeToolCall) {
            activeToolCall = null;
            showIndicator("thinking…");
          }
          return;
        case "text_end":
        case "thinking_end":
          return;
        case "chunk":
          // The actual reply text. Clear the transient indicator and
          // accumulate into the main bubble.
          clearIndicator();
          activeToolCall = null;
          appendInflight(data.text || "");
          return;
        case "turn_end":
          // Lifecycle says the kernel turn is done — but final
          // `chunk` events may still be in flight from the send path.
          // Just clear transient indicators; let `done` close out.
          clearIndicator();
          activeToolCall = null;
          return;
        case "done":
          endInflight();
          return;
        case "error":
          appendMessage("error", "error: " + (data.message || "(unspecified)"));
          endInflight();
          return;
      }
    };
    es.addEventListener("error", (ev) => {
      try {
        const data = JSON.parse(ev.data);
        appendMessage("error", "stream: " + (data.message || ""));
      } catch (e) {
        setStatus("stream error — retrying", "warn");
      }
    });
    es.onerror = () => setStatus("stream disconnected — retrying", "warn");
    return es;
  }

  async function submitMessage(text) {
    button.disabled = true;
    input.disabled = true;
    appendMessage("user", text);
    try {
      const r = await fetch("/api/chat/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text }),
      });
      if (!r.ok) {
        const body = await r.json().catch(() => ({}));
        appendMessage(
          "error",
          "send failed (" + r.status + "): " + (body.error || "(unspecified)")
        );
        endInflight();
        return;
      }
    } catch (e) {
      appendMessage("error", "send failed: " + e.message);
      endInflight();
    }
  }

  form.addEventListener("submit", (ev) => {
    ev.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    submitMessage(text);
  });

  input.addEventListener("keydown", (ev) => {
    // Enter sends; Shift+Enter inserts a newline.
    if (ev.key === "Enter" && !ev.shiftKey) {
      ev.preventDefault();
      form.requestSubmit();
    }
  });

  // Boot.
  loadHistory();
  openStream();
  input.focus();
})();
</script>
{% endblock %}
