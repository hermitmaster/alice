; PlatformIO project — Qualia face Arduino-ESP32 port.
;
; Target: Adafruit Qualia ESP32-S3 RGB-666 (product 5800) paired with the
; 2.1" 480x480 RGB666 Round21 panel (product 5792).
;
; The whole reason this exists vs the CircuitPython version: enable the
; ESP-IDF RGB panel "bounce buffer" mode so the LCD DMA is fed from internal
; SRAM instead of PSRAM. WiFi traffic to PSRAM was starving the pixel clock
; on the CircuitPython driver, producing visible column-shift jitter.

; pioarduino's espressif32 fork bundles arduino-esp32 v3.x on top of ESP-IDF
; v5.x, which is what exposes the RGB panel bounce-buffer API
; (bounce_buffer_size_px, esp_lcd_rgb_panel_get_frame_buffer).
[env:adafruit_qualia_s3_rgb666]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = adafruit_qualia_s3_rgb666
framework = arduino

board_build.partitions = default_8MB.csv
board_build.psram_type = opi
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Bounce-buffer fix lives in panel_round21.h; nothing extra needed for
    ; the IDF v5/arduino-esp32 v3 wrapper to expose esp_lcd_new_rgb_panel.

build_unflags =
    -std=gnu++11

build_src_flags =
    -std=gnu++17

lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    esp32async/ESPAsyncWebServer@^3.6.0
    esp32async/AsyncTCP@^3.3.2
